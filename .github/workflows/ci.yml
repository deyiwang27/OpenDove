name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - feat/**

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run lint
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest
